<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Routine - No Classes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-container": "#636261",
                      "inverse-on-surface": "#f2f1ee",
                      "accent-muted": "#EAF1ED",
                      "inverse-primary": "#95d4b3",
                      "background": "#faf9f6",
                      "tertiary-container": "#625f57",
                      "on-secondary-fixed-variant": "#474745",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-container": "#ded9cf",
                      "primary-fixed": "#b1f0ce",
                      "on-tertiary-fixed": "#1d1c16",
                      "surface-dim": "#dbdad7",
                      "tertiary-fixed": "#e7e2d8",
                      "secondary-container": "#e2dfdd",
                      "error-container": "#ffdad6",
                      "surface-container-high": "#e9e8e5",
                      "error": "#ba1a1a",
                      "surface-variant": "#e3e2df",
                      "tertiary": "#4a4740",
                      "on-error-container": "#93000a",
                      "primary-container": "#2d6a4f",
                      "on-primary-fixed-variant": "#0e5138",
                      "secondary": "#5f5e5d",
                      "line": "#E4E2DD",
                      "tertiary-fixed-dim": "#cbc6bc",
                      "outline": "#707973",
                      "on-secondary": "#ffffff",
                      "inverse-surface": "#2f312f",
                      "secondary-fixed": "#e5e2e0",
                      "on-surface": "#1b1c1a",
                      "secondary-fixed-dim": "#c9c6c4",
                      "on-primary": "#ffffff",
                      "on-secondary-fixed": "#1c1c1a",
                      "primary": "#0f5238",
                      "on-primary-container": "#a8e7c5",
                      "primary-fixed-dim": "#95d4b3",
                      "text-tertiary": "#AEADA8",
                      "on-tertiary": "#ffffff",
                      "surface-container-low": "#f4f3f0",
                      "outline-variant": "#bfc9c1",
                      "surface-tint": "#2c694e",
                      "on-tertiary-fixed-variant": "#49473f",
                      "surface-bright": "#faf9f6",
                      "destructive": "#C0392B",
                      "on-primary-fixed": "#002114",
                      "surface-container-highest": "#e3e2df",
                      "surface": "#FFFFFF",
                      "sunken": "#EEECE8",
                      "surface-container": "#efeeeb",
                      "on-background": "#1b1c1a",
                      "on-surface-variant": "#404943",
                      "on-error": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "32px",
                      "margin-h": "20px",
                      "md": "16px",
                      "xs": "4px",
                      "lg": "24px",
                      "button-height": "50px",
                      "sm": "8px",
                      "xxl": "48px"
              },
              "fontFamily": {
                      "section-header": ["Instrument Sans"],
                      "data-mono": ["Geist Mono"],
                      "display-wordmark": ["Instrument Sans"],
                      "headline-lg": ["Instrument Sans"],
                      "course-name": ["Instrument Sans"],
                      "body-md": ["Instrument Sans"],
                      "code-mono": ["Geist Mono"],
                      "label-md": ["Instrument Sans"],
                      "event-title": ["Instrument Sans"],
                      "headline-lg-mobile": ["Instrument Sans"],
                      "caption": ["Instrument Sans"]
              },
              "fontSize": {
                      "section-header": ["13px", {"lineHeight": "18px", "letterSpacing": "0.4px", "fontWeight": "600"}],
                      "data-mono": ["13px", {"lineHeight": "16px", "letterSpacing": "0px", "fontWeight": "400"}],
                      "display-wordmark": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.5px", "fontWeight": "600"}],
                      "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.5px", "fontWeight": "600"}],
                      "course-name": ["16px", {"lineHeight": "22px", "letterSpacing": "-0.2px", "fontWeight": "500"}],
                      "body-md": ["15px", {"lineHeight": "22px", "letterSpacing": "0px", "fontWeight": "400"}],
                      "code-mono": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1px", "fontWeight": "400"}],
                      "label-md": ["13px", {"lineHeight": "18px", "letterSpacing": "0px", "fontWeight": "400"}],
                      "event-title": ["24px", {"lineHeight": "28px", "letterSpacing": "-0.2px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.5px", "fontWeight": "600"}],
                      "caption": ["11px", {"lineHeight": "16px", "letterSpacing": "0.1px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
        body {
            background-color: #faf9f6; /* bg-background fallback */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased flex flex-col min-h-screen font-body-md text-body-md">
<!-- TopAppBar (Web & Tablet) - Hidden on Mobile, Flex on MD+ -->
<header class="hidden md:flex justify-between items-center w-full px-margin-h h-[50px] bg-background border-b border-line top-0 z-50 fixed">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[24px]" data-icon="grid_view">grid_view</span>
<span class="font-display-wordmark text-display-wordmark text-primary ml-2">Quicklime</span>
</div>
<nav class="flex items-center gap-lg">
<a class="text-secondary hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined" data-icon="today">today</span>
</a>
<a class="text-secondary hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined" data-icon="calendar_view_day">calendar_view_day</span>
</a>
<a class="text-primary hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined" data-icon="event_note" data-weight="fill">event_note</span>
</a>
<a class="text-secondary hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
</header>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-[800px] mx-auto px-margin-h md:pt-[50px] pb-[80px] md:pb-xl flex flex-col h-screen">
<!-- Mobile Header Spacer -->
<div class="md:hidden pt-xl"></div>
<!-- Header -->
<header class="mb-lg mt-md">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">Routine</h1>
</header>
<!-- Day Selector Pill Row -->
<div class="flex items-center gap-sm overflow-x-auto pb-sm mb-xxl no-scrollbar">
<!-- Active Day (Sunday) -->
<button class="flex-shrink-0 px-md py-sm bg-on-surface text-on-primary rounded-full font-label-md text-label-md transition-all">
                Sun
            </button>
<!-- Inactive Days -->
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Mon
            </button>
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Tue
            </button>
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Wed
            </button>
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Thu
            </button>
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Fri
            </button>
<button class="flex-shrink-0 px-md py-sm bg-surface text-on-surface-variant border border-line rounded-full font-label-md text-label-md hover:bg-surface-variant transition-all">
                Sat
            </button>
</div>
<!-- Empty State -->
<div class="flex-grow flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-[48px] text-line mb-md" data-icon="calendar_month">calendar_month</span>
<p class="font-body-md text-body-md text-text-tertiary">No classes on Sunday</p>
</div>
</main>
<!-- BottomNavBar (Mobile) - Flex on Mobile, Hidden on MD+ -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center h-[64px] bg-surface border-t border-line">
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity w-[64px] h-full" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="today">today</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity w-[64px] h-full" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="calendar_view_day">calendar_view_day</span>
</a>
<!-- Active Tab: Routine / Event Note -->
<a class="flex flex-col items-center justify-center text-primary scale-90 duration-150 w-[64px] h-full after:content-[''] after:block after:w-1.5 after:h-1.5 after:bg-primary after:rounded-full after:mt-1" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="event_note" data-weight="fill">event_note</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity w-[64px] h-full" href="#">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="settings">settings</span>
</a>
</nav>
<style>
        /* Utility for hiding scrollbar but allowing scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</body></html>
