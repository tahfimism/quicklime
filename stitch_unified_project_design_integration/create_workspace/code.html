<body class="bg-[#F7F6F3] text-on-surface font-sans min-h-screen flex flex-col items-center justify-center p-margin-h antialiased">
<!-- Main Content Container -->
<main class="w-full max-w-md bg-surface border border-line rounded-[16px] shadow-[0_4px_24px_rgba(0,0,0,0.02)] overflow-hidden">
<!-- Header Section -->
<div class="px-lg pt-lg pb-md border-b border-line/50">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">
                Name your workspace
            </h1>
<p class="font-body-md text-body-md text-secondary">
                This is usually your class or batch name.
            </p>
</div>
<!-- Form Section -->
<div class="p-lg">
<form action="#" class="space-y-xl" method="POST">
<!-- Input Group -->
<div class="space-y-sm">
<label class="block font-section-header text-section-header text-secondary uppercase tracking-widest" for="workspace-name">
                        Workspace Name
                    </label>
<div class="relative">
<input class="w-full h-button-height px-md bg-surface border border-line rounded-lg font-course-name text-course-name text-on-surface placeholder:text-text-tertiary focus:border-primary focus:ring-1 focus:ring-primary transition-colors duration-200" id="workspace-name" name="workspace-name" placeholder="CSE Batch 25, Section A" required="" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-button-height bg-on-surface text-surface rounded-xl font-course-name text-course-name hover:bg-inverse-surface active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm" type="submit">
                    Create workspace
                    <span aria-hidden="true" class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
</div>
<!-- Optional Footer / Helper Text -->
<div class="bg-surface-container-low px-lg py-md border-t border-line text-center">
<p class="font-caption text-caption text-text-tertiary flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]">lock</span>
                 Secure workspace creation
             </p>
</div>
