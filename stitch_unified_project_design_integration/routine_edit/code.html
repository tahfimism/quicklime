<!DOCTYPE html>

<style>
        body { background-color: theme('colors.surface-dim'); }
        /* Full screen modal animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-sheet {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="antialiased flex items-center justify-center min-h-screen p-0 md:p-lg">
<!-- Modal Container (Simulating the full-screen sheet on mobile, centered card on web) -->
<div class="modal-sheet w-full h-full md:h-auto md:max-w-md md:rounded-[24px] bg-surface flex flex-col overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.08)]">
<!-- Header -->
<header class="flex justify-between items-center w-full px-margin-h h-[64px] border-b border-line bg-surface shrink-0 z-10">
<button aria-label="Close" class="flex items-center justify-center w-10 h-10 -ml-2 text-on-surface hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 400;">close</span>
</button>
<h1 class="font-course-name text-course-name text-on-surface text-center flex-1">Monday Routine</h1>
<button class="font-section-header text-section-header text-primary px-2 py-2 hover:opacity-80 transition-opacity">
                Save
            </button>
</header>
<!-- Scrollable Content -->
<main class="flex-1 overflow-y-auto bg-surface pb-xxl">
<div class="px-margin-h py-lg">
<h2 class="font-section-header text-section-header text-on-surface-variant uppercase tracking-widest mb-md">Current Slots</h2>
<!-- Routine Slots List -->
<div class="flex flex-col gap-sm">
<!-- Slot 1 -->
<div class="flex items-center bg-surface border border-line rounded-lg p-md group hover:bg-surface-container-low transition-colors">
<div class="flex-1 min-w-0 pr-md border-r border-line">
<div class="flex items-baseline justify-between mb-1">
<span class="font-course-name text-course-name text-on-surface truncate">Advanced Typography</span>
<span class="font-data-mono text-data-mono text-on-surface-variant whitespace-nowrap ml-sm">09:00</span>
</div>
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface-variant truncate">Room 402</span>
<span class="font-data-mono text-data-mono text-text-tertiary whitespace-nowrap ml-sm">10:30</span>
</div>
</div>
<button aria-label="Delete slot" class="flex items-center justify-center w-12 h-full text-text-tertiary hover:text-destructive transition-colors pl-sm">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Slot 2 -->
<div class="flex items-center bg-surface border border-line rounded-lg p-md group hover:bg-surface-container-low transition-colors">
<div class="flex-1 min-w-0 pr-md border-r border-line">
<div class="flex items-baseline justify-between mb-1">
<span class="font-course-name text-course-name text-on-surface truncate">Editorial Design</span>
<span class="font-data-mono text-data-mono text-on-surface-variant whitespace-nowrap ml-sm">11:00</span>
</div>
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface-variant truncate">Studio A</span>
<span class="font-data-mono text-data-mono text-text-tertiary whitespace-nowrap ml-sm">13:00</span>
</div>
</div>
<button aria-label="Delete slot" class="flex items-center justify-center w-12 h-full text-text-tertiary hover:text-destructive transition-colors pl-sm">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Slot 3 -->
<div class="flex items-center bg-surface border border-line rounded-lg p-md group hover:bg-surface-container-low transition-colors">
<div class="flex-1 min-w-0 pr-md border-r border-line">
<div class="flex items-baseline justify-between mb-1">
<span class="font-course-name text-course-name text-on-surface truncate">Digital Platforms</span>
<span class="font-data-mono text-data-mono text-on-surface-variant whitespace-nowrap ml-sm">14:00</span>
</div>
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface-variant truncate">Lab 2</span>
<span class="font-data-mono text-data-mono text-text-tertiary whitespace-nowrap ml-sm">15:30</span>
</div>
</div>
<button aria-label="Delete slot" class="flex items-center justify-center w-12 h-full text-text-tertiary hover:text-destructive transition-colors pl-sm">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<!-- Add Slot Action -->
<button class="flex items-center justify-center w-full bg-surface border border-dashed border-outline-variant rounded-lg p-md mt-sm text-primary hover:bg-accent-muted transition-colors group">
<span class="material-symbols-outlined mr-sm text-[20px]">add</span>
<span class="font-course-name text-course-name">Add slot</span>
</button>
</div>
</div>
<!-- Contextual Info / Helper -->
<div class="px-margin-h mt-lg flex items-start gap-3">
<span class="material-symbols-outlined text-text-tertiary text-[20px] mt-0.5">info</span>
<p class="font-label-md text-label-md text-on-surface-variant">
                    Changes made here will be reflected in the schedule for all students enrolled in this section immediately upon saving.
                </p>
</div>
</main>
</div>
</body></html>
