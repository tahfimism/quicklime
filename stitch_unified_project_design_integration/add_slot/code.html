<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-font-smoothing: antialiased;
        }
        
        /* Backdrop blur for the scrim */
        .scrim {
            background-color: rgba(27, 28, 26, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Bottom sheet animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .bottom-sheet {
            animation: slideUp 0.3s cubic-bezier(0.2, 0, 0, 1) forwards;
        }

        /* Custom input styles matching design system */
        .ds-input {
            height: theme('spacing.button-height');
            background-color: theme('colors.surface');
            border: 1px solid theme('colors.line');
            border-radius: theme('borderRadius.DEFAULT');
            padding: 0 theme('spacing.md');
            color: theme('colors.on-surface');
            width: 100%;
            transition: border-color 0.2s ease;
            outline: none;
        }
        .ds-input:focus {
            border-color: theme('colors.primary');
            border-width: 1.5px;
        }
        .ds-input::placeholder {
            color: theme('colors.text-tertiary');
        }

        /* Time picker inputs */
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.4) sepia(0) saturate(0) hue-rotate(0deg);
            cursor: pointer;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen relative overflow-hidden">
<!-- Background Canvas (Simulating the underlying app screen) -->
<div class="flex-1 w-full max-w-md mx-auto relative px-margin-h pt-xl pb-32">
<header class="flex justify-between items-center w-full h-[50px] border-b border-line mb-lg">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[22px]">grid_view</span>
<h1 class="font-display-wordmark text-display-wordmark text-primary">Quicklime</h1>
</div>
</header>
<div class="space-y-md opacity-40 blur-[2px] pointer-events-none">
<div class="bg-surface border border-line rounded-lg p-md h-32 w-full"></div>
<div class="bg-surface border border-line rounded-lg p-md h-24 w-full"></div>
<div class="bg-surface border border-line rounded-lg p-md h-40 w-full"></div>
</div>
</div>
<!-- Scrim & Bottom Sheet Container -->
<div class="fixed inset-0 z-50 flex flex-col justify-end scrim sm:items-center sm:justify-center p-0 sm:p-margin-h">
<!-- Interactive area to dismiss (click outside) -->
<div aria-hidden="true" class="absolute inset-0 cursor-pointer"></div>
<!-- The Bottom Sheet / Modal -->
<div class="bottom-sheet bg-background w-full sm:max-w-md rounded-t-[24px] sm:rounded-xl shadow-2xl relative flex flex-col max-h-[795px]">
<!-- Drag Handle (Mobile) -->
<div class="w-full flex justify-center pt-sm pb-xs sm:hidden">
<div class="w-12 h-1 bg-line rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-h py-md flex justify-between items-center border-b border-line shrink-0">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Add Slot</h2>
<button aria-label="Close" class="text-secondary hover:text-on-surface transition-colors w-[44px] h-[44px] flex items-center justify-center -mr-xs">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="px-margin-h py-lg overflow-y-auto space-y-lg flex-1">
<!-- Main Details Group -->
<div class="space-y-md">
<!-- Course Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="courseName">Course Name</label>
<input class="ds-input font-body-md text-body-md" id="courseName" placeholder="e.g. Graphic Design History" type="text"/>
</div>
<!-- Course Code & Room Row -->
<div class="flex gap-md w-full">
<div class="space-y-xs flex-1">
<label class="font-label-md text-label-md text-on-surface-variant block" for="courseCode">Course Code</label>
<input class="ds-input font-data-mono text-data-mono uppercase tracking-wider" id="courseCode" placeholder="DES-301" type="text"/>
</div>
<div class="space-y-xs flex-1">
<label class="font-label-md text-label-md text-on-surface-variant block flex items-center gap-1" for="room">
                                Room <span class="text-text-tertiary font-caption text-caption">(Optional)</span>
</label>
<input class="ds-input font-body-md text-body-md" id="room" placeholder="e.g. Studio 4" type="text"/>
</div>
</div>
<!-- Teacher Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block" for="teacherName">Teacher Name</label>
<input class="ds-input font-body-md text-body-md" id="teacherName" placeholder="e.g. Prof. R. Müller" type="text"/>
</div>
</div>
<!-- Divider -->
<div class="h-px bg-line w-full"></div>
<!-- Timing Group -->
<div class="space-y-md">
<h3 class="font-section-header text-section-header text-on-surface uppercase tracking-wider">Timing</h3>
<div class="flex gap-md w-full">
<div class="space-y-xs flex-1 relative">
<label class="font-label-md text-label-md text-on-surface-variant block" for="startTime">Start Time</label>
<div class="relative">
<input class="ds-input font-data-mono text-data-mono w-full" id="startTime" type="time" value="09:00"/>
</div>
</div>
<div class="space-y-xs flex-1">
<label class="font-label-md text-label-md text-on-surface-variant block" for="endTime">End Time</label>
<div class="relative">
<input class="ds-input font-data-mono text-data-mono w-full" id="endTime" type="time" value="10:30"/>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-margin-h border-t border-line bg-surface sm:rounded-b-xl shrink-0 pb-[calc(theme('spacing.margin-h')+env(safe-area-inset-bottom))] sm:pb-margin-h">
<button class="w-full h-button-height bg-on-surface text-on-primary font-section-header text-section-header rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    Add Slot
                </button>
</div>
</div>
</div>
</body></html>
