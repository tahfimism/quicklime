<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Specific input styling based on guidelines */
        .invite-input {
            width: 46px;
            height: 56px;
            border-radius: 10px;
            border: 1px solid theme('colors.line');
            background-color: theme('colors.surface');
            text-align: center;
            font-family: 'Geist Mono', monospace;
            font-size: 24px;
            line-height: 28px;
            color: theme('colors.on-surface');
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .invite-input:focus {
            border-width: 1.5px;
            border-color: theme('colors.accent');
        }

        /* Hide number arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface h-full flex flex-col items-center justify-center antialiased selection:bg-accent-muted selection:text-on-surface">
<!-- Top Navigation (Back button for transactional flow) -->
<nav class="absolute top-0 w-full px-margin-h h-[50px] flex items-center mt-xl max-w-md mx-auto z-10">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[22px] text-on-surface">arrow_back</span>
</button>
</nav>
<!-- Main Content Canvas -->
<main class="w-full max-w-md px-margin-h flex flex-col items-center pb-[176px]">
<!-- Header Section -->
<header class="text-center w-full mb-xxl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-sm">
                Enter invite code
            </h1>
<p class="font-body-md text-body-md text-secondary max-w-[280px] mx-auto">
                Ask your class representative for the 6-character code.
            </p>
</header>
<!-- Input Section -->
<form class="w-full flex flex-col items-center gap-xxl" id="invite-form">
<div class="flex justify-center gap-sm md:gap-md w-full" dir="ltr">
<!-- 6 Individual Inputs -->
<input aria-label="Character 1" autofocus="" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
<input aria-label="Character 2" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
<input aria-label="Character 3" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
<input aria-label="Character 4" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
<input aria-label="Character 5" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
<input aria-label="Character 6" class="invite-input" maxlength="1" pattern="[A-Za-z0-9]" type="text"/>
</div>
<!-- Action Button (Disabled by default until 6 chars entered) -->
<button class="w-full max-w-[280px] h-button-height bg-primary text-on-primary rounded-xl font-section-header text-section-header transition-opacity disabled:opacity-50 disabled:cursor-not-allowed hover:opacity-90 mt-md flex items-center justify-center gap-sm" disabled="" id="submit-btn" type="submit">
                Join Workspace
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.invite-input');
            const submitBtn = document.getElementById('submit-btn');

            // Auto-focus and backspace logic
            inputs.forEach((input, index) => {
                // Convert to uppercase
                input.addEventListener('input', function() {
                    this.value = this.value.toUpperCase();
                    
                    // Move to next input if filled
                    if (this.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    checkFormValidity();
                });

                // Handle backspace to go to previous input
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                // Focus on paste to distribute characters
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const pasteData = (e.clipboardData || window.clipboardData).getData('text').toUpperCase().replace(/[^A-Z0-9]/g, '');
                    
                    for (let i = 0; i < pasteData.length && i < inputs.length; i++) {
                        inputs[i].value = pasteData[i];
                    }
                    
                    const nextFocusIndex = Math.min(pasteData.length, inputs.length - 1);
                    inputs[nextFocusIndex].focus();
                    checkFormValidity();
                });
            });

            function checkFormValidity() {
                let isValid = true;
                inputs.forEach(input => {
                    if (input.value.length !== 1) {
                        isValid = false;
                    }
                });
                submitBtn.disabled = !isValid;
            }
        });
    </script>
