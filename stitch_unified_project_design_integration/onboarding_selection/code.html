<body class="bg-[#F7F6F3] min-h-screen flex flex-col items-center justify-center p-margin-h md:p-0">
<!-- Container matching 4pt grid logic and minimal styling -->
<main class="w-full max-w-[400px] flex flex-col gap-xxl relative">
<!-- Back Navigation (Contextual departure, Top Navigation suppressed as per rules) -->
<div class="absolute -top-xl md:-top-xxl left-0">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back" data-weight="regular">arrow_back</span>
</button>
</div>
<!-- Header Section -->
<header class="flex flex-col gap-sm pt-xl">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Get started</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create a new workspace or join one with an invite code.</p>
</header>
<!-- Actions Container -->
<div class="flex flex-col gap-md">
<!-- Primary Button -->
<button class="h-button-height w-full bg-on-surface text-surface rounded-xl font-course-name text-course-name flex items-center justify-center transition-transform hover:scale-[0.98] active:scale-95 shadow-sm">
                Create a workspace
            </button>
<!-- Secondary Button -->
<button class="h-button-height w-full bg-transparent text-on-surface border-[1.5px] border-line rounded-xl font-course-name text-course-name flex items-center justify-center transition-colors hover:bg-surface-variant active:bg-surface-container">
